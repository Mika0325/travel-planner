<!DOCTYPE html>
<html lang="ja">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>メモ | 旅のしおり</title>

    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/memo.css">

</head>

<body>

    <header>

        <div class="container header-inner">

            <a href="index.html" class="logo">

                ✈ 旅のしおり

            </a>

            <nav>

                <ul>

                    <li>

                        <a href="index.html">

                            🏠 ホーム

                        </a>

                    </li>

                    <li>

                        <a href="memo.html" class="active">

                            📝 メモ

                        </a>

                    </li>

                    <li>

                        <a href="planner.html">

                            📅 計画

                        </a>

                    </li>

                    <li>

                        <a href="preview.html">

                            📖 確認

                        </a>

                    </li>

                </ul>

            </nav>

        </div>

    </header>

    <main>

        <div class="container">

            <section class="page-header">

                <div>

                    <h1>

                        📝 メモ

                    </h1>

                    <p>

                        旅行前の持ち物や自由メモを管理できます。

                    </p>

                </div>

                <div class="memo-counter">

                    保存件数

                    <span id="memoCount">

                        0

                    </span>

                    件

                </div>

            </section>

            <section class="toolbar card">

                <input type="search" id="searchInput" placeholder="メモを検索">

                <select id="category">

                    <option value="all">

                        すべて

                    </option>

                    <option>

                        持ち物

                    </option>

                    <option>

                        買い物

                    </option>

                    <option>

                        その他

                    </option>

                </select>

            </section>

            <section class="add-area card">

                <h2>

                    新しいメモ

                </h2>

                <div class="input-group">

                    <select id="memoCategory">
                        <option value="持ち物">🎒 持ち物</option>
                        <option value="買い物">🛒 買い物</option>
                        <option value="その他">📝 その他</option>
                    </select>

                    <input type="text" id="memoInput" placeholder="例：モバイルバッテリー">

                    <button id="addButton" class="btn btn-primary">

                        ＋追加

                    </button>

                </div>

            </section>

            <section>

                <div id="memoList" class="memo-list">

                </div>

            </section>

        </div>

    </main>

    <footer>

        <div class="container">

            <p>

                © 2026 Travel Planner

            </p>

        </div>

    </footer>

    <script src="js/common.js"></script>

    <script src="js/memo.js"></script>

</body>

</html>
